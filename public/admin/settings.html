<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings — Travel Assist Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../css/theme.css" rel="stylesheet">
<style>
  body { background: #f5f6fa; }
  .sidebar { min-height: 100vh; background: #0d1b2a; }
  .sidebar a { color: rgba(255,255,255,.75); }
  .sidebar a.active, .sidebar a:hover { color: #fff; background: rgba(255,255,255,.08); }
</style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar p-3" style="width: 220px;">
    <div class="text-white h5 mb-4">Travel Assist</div>
    <a href="dashboard.html" class="d-block rounded px-3 py-2 mb-1 text-decoration-none">Dashboard</a>
    <a href="settings.html" class="d-block rounded px-3 py-2 mb-1 text-decoration-none active">Settings</a>
    <a href="../" class="d-block rounded px-3 py-2 mb-1 text-decoration-none">View Site</a>
    <button id="logout-btn" class="btn btn-sm btn-outline-light mt-4 w-100">Log Out</button>
  </nav>

  <main class="flex-grow-1 p-4" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 mb-0">Settings</h1>
      <span class="text-muted small">Signed in as <strong id="admin-username">…</strong></span>
    </div>

    <div id="settings-alert" class="alert d-none"></div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h6">AI Advisor Configuration</h2>
        <p class="text-muted small">The Anthropic API key is stored in the database, never in code or config files.</p>

        <form id="settings-form">
          <div class="mb-3">
            <label class="form-label small" for="api-key">Anthropic API Key</label>
            <input type="password" id="api-key" class="form-control" placeholder="Currently unset" autocomplete="off">
            <div class="form-text" id="api-key-hint"></div>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="model">Model</label>
            <input type="text" id="model" class="form-control" placeholder="claude-sonnet-5">
            <div class="form-text">e.g. claude-sonnet-5, claude-opus-4-8, claude-haiku-4-5-20251001</div>
          </div>
          <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h6">Change Admin Password</h2>

        <div id="password-alert" class="alert d-none"></div>

        <form id="password-form">
          <div class="mb-3">
            <label class="form-label small" for="current-password">Current Password</label>
            <input type="password" id="current-password" class="form-control" autocomplete="current-password" required>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="new-password">New Password</label>
            <input type="password" id="new-password" class="form-control" autocomplete="new-password" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-outline-primary">Update Password</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="js/admin-api.js"></script>
<script src="js/guard.js"></script>
<script>
  const apiKeyInput = document.getElementById('api-key');
  const apiKeyHint = document.getElementById('api-key-hint');
  const modelInput = document.getElementById('model');

  async function loadSettings() {
    try {
      const settings = await AdminApi.getSettings();
      apiKeyHint.textContent = settings.anthropic_api_key_set
        ? `Currently set (${settings.anthropic_api_key_preview}). Leave blank to keep it unchanged.`
        : 'No key set yet. The advisor chat will not work until one is added.';
      modelInput.value = settings.anthropic_model || '';
    } catch (err) {
      // guard.js handles redirect on auth failure
    }
  }
  loadSettings();

  document.getElementById('settings-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const alertBox = document.getElementById('settings-alert');
    alertBox.classList.add('d-none');

    try {
      await AdminApi.updateSettings({
        anthropic_api_key: apiKeyInput.value.trim(),
        anthropic_model: modelInput.value.trim(),
      });
      apiKeyInput.value = '';
      alertBox.className = 'alert alert-success';
      alertBox.textContent = 'Settings saved.';
      loadSettings();
    } catch (err) {
      alertBox.className = 'alert alert-danger';
      alertBox.textContent = err.message;
    }
  });

  document.getElementById('password-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const alertBox = document.getElementById('password-alert');
    alertBox.classList.add('d-none');

    const currentPassword = document.getElementById('current-password').value;
    const newPassword = document.getElementById('new-password').value;

    try {
      await AdminApi.changePassword({ current_password: currentPassword, new_password: newPassword });
      document.getElementById('password-form').reset();
      alertBox.className = 'alert alert-success';
      alertBox.textContent = 'Password updated.';
    } catch (err) {
      alertBox.className = 'alert alert-danger';
      alertBox.textContent = err.message;
    }
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await AdminApi.logout();
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
