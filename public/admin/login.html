<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login — Travel Assist</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../css/theme.css" rel="stylesheet">
<style>
  body { background: #0d1b2a; min-height: 100vh; display: flex; align-items: center; }
  .login-card { max-width: 380px; width: 100%; margin: 0 auto; }
</style>
</head>
<body>
<div class="container">
  <div class="card login-card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-1">Travel Assist Admin</h1>
      <p class="text-muted small mb-4">Sign in to manage API keys and settings.</p>

      <div id="login-error" class="alert alert-danger d-none py-2 small"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label small" for="username">Username</label>
          <input type="text" id="username" class="form-control" autocomplete="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label small" for="password">Password</label>
          <input type="password" id="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>
  </div>
</div>

<script src="js/admin-api.js"></script>
<script>
  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('login-error');

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    errorBox.classList.add('d-none');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      await AdminApi.login(username, password);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove('d-none');
    }
  });
</script>
</body>
</html>
